x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zhongbei_info}
      MYSQL_USER: ${MYSQL_USER:-zhongbei}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-zhongbei}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root-password}
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--innodb-buffer-pool-size=64M"
      - "--innodb-log-buffer-size=8M"
      - "--max-connections=20"
      - "--tmp-table-size=16M"
      - "--max-heap-table-size=16M"
      - "--table-open-cache=400"
      - "--sort-buffer-size=256K"
      - "--read-buffer-size=256K"
      - "--join-buffer-size=256K"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.14
    restart: unless-stopped
    logging: *default-logging
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-change-meili-key}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data

  web:
    build: .
    restart: unless-stopped
    logging: *default-logging
    env_file: ${APP_ENV_FILE:-.env}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn zhongbei_info.asgi:application --bind 0.0.0.0:8000 --workers 1 -k uvicorn_worker.UvicornWorker --timeout 60 --max-requests 500 --max-requests-jitter 50"
    volumes:
      - static_data:/app/staticfiles
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build: .
    restart: unless-stopped
    logging: *default-logging
    env_file: ${APP_ENV_FILE:-.env}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    command: ["celery", "-A", "zhongbei_info", "worker", "--loglevel=INFO", "--concurrency=1", "--max-tasks-per-child=100", "--max-memory-per-child=200000"]

  agent_worker:
    build: .
    restart: unless-stopped
    logging: *default-logging
    env_file: ${APP_ENV_FILE:-.env}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    command: ["celery", "-A", "zhongbei_info", "worker", "--loglevel=INFO", "--concurrency=1", "--queues=agent", "--hostname=agent@%h", "--max-tasks-per-child=100", "--max-memory-per-child=200000"]

  scheduler:
    build: .
    restart: unless-stopped
    logging: *default-logging
    env_file: ${APP_ENV_FILE:-.env}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "zhongbei_info", "beat", "--loglevel=INFO", "--scheduler=django_celery_beat.schedulers:DatabaseScheduler"]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/staticfiles:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    profiles: ["ops"]
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot

volumes:
  mysql_data:
  redis_data:
  meili_data:
  static_data:
  certbot_webroot:
