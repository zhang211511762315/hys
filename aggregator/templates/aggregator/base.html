<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>{% block title %}中北信息聚合{% endblock %}</title>
  <style>
    :root { color-scheme: light; --ink:#17202a; --muted:#667085; --line:#d9dee7; --brand:#0f766e; --brand-dark:#115e59; --soft:#ecfdf5; --bg:#f7f8fb; }
    body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:var(--ink); background:var(--bg); }
    header { background:#fff; border-bottom:1px solid var(--line); }
    .wrap { width:min(1120px, calc(100% - 32px)); margin:0 auto; }
    .topbar { display:flex; align-items:center; justify-content:space-between; min-height:64px; gap:16px; }
    a { color:var(--brand); text-decoration:none; }
    nav a { color:var(--ink); margin-left:18px; }
    main { padding:28px 0 48px; }
    .hero { background:linear-gradient(135deg, #ffffff 0%, var(--soft) 100%); border:1px solid var(--line); border-radius:8px; padding:24px; margin-bottom:18px; }
    .hero h1 { margin:0 0 10px; font-size:28px; line-height:1.25; }
    .hero p { max-width:820px; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; }
    .button { display:inline-flex; align-items:center; justify-content:center; min-height:38px; padding:0 14px; border-radius:6px; background:var(--brand); color:#fff; border:1px solid var(--brand); }
    .button.secondary { background:#fff; color:var(--brand-dark); border-color:var(--line); }
    .grid { display:grid; grid-template-columns: minmax(0, 1fr) 280px; gap:24px; align-items:start; }
    .item { background:#fff; border:1px solid var(--line); border-radius:8px; padding:18px; margin-bottom:14px; }
    .item h2, .item h1 { margin:0 0 10px; font-size:20px; line-height:1.35; }
    .meta { color:var(--muted); font-size:14px; margin-bottom:10px; }
    .summary { line-height:1.7; margin:0 0 12px; }
    .tags { display:flex; flex-wrap:wrap; gap:8px; }
    .tag { border:1px solid var(--line); color:var(--muted); border-radius:999px; padding:3px 9px; font-size:13px; }
    .panel { background:#fff; border:1px solid var(--line); border-radius:8px; padding:16px; }
    .panel h2 { margin:16px 0 8px; font-size:15px; color:var(--muted); }
    .panel h2:first-child { margin-top:0; }
    .panel p { margin:6px 0; }
    .panel .count { color:var(--muted); font-size:13px; }
    input, select, button { font:inherit; }
    .searchbar { display:flex; gap:8px; margin-bottom:18px; }
    .searchbar input, .searchbar select { padding:10px 12px; border:1px solid var(--line); border-radius:6px; }
    .searchbar input { flex:1; min-width:0; }
    .searchbar button { padding:10px 14px; border:0; border-radius:6px; background:var(--brand); color:#fff; }
    .toolbar { display:flex; align-items:center; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
    .toolbar .sort-group { display:flex; gap:0; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
    .toolbar .sort-group a { padding:8px 16px; font-size:14px; color:var(--muted); text-decoration:none; border-right:1px solid var(--line); }
    .toolbar .sort-group a:last-child { border-right:0; }
    .toolbar .sort-group a.active { background:var(--brand); color:#fff; }
    .toolbar .date-group { display:flex; align-items:center; gap:6px; flex:1; min-width:0; }
    .toolbar .date-group input[type=date] { padding:7px 10px; border:1px solid var(--line); border-radius:6px; font-size:14px; flex:1; min-width:0; max-width:180px; }
    .toolbar .date-group button { padding:7px 14px; border:0; border-radius:6px; background:var(--brand); color:#fff; font-size:14px; cursor:pointer; }
    .metrics { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:12px; margin-bottom:18px; }
    .metric { background:#fff; border:1px solid var(--line); border-radius:8px; padding:14px; }
    .metric strong { display:block; font-size:22px; margin-top:4px; }
    .chat-shell { display:grid; grid-template-columns:minmax(0, 1fr) 300px; gap:20px; align-items:start; }
    .chat-log { background:#fff; border:1px solid var(--line); border-radius:8px; min-height:420px; padding:16px; }
    .chat-message { border-bottom:1px solid var(--line); padding:12px 0; line-height:1.7; white-space:pre-wrap; }
    .chat-message:last-child { border-bottom:0; }
    .chat-role { color:var(--muted); font-size:13px; margin-bottom:4px; }
    .usage-line { color:var(--muted); font-size:13px; margin-top:8px; }
    .citation-list { display:flex; flex-direction:column; gap:10px; margin-top:12px; }
    .citation { border:1px solid var(--line); border-radius:8px; padding:10px; background:#fff; }
    .ask-form { display:flex; gap:8px; margin-bottom:14px; }
    .ask-form input { flex:1; min-width:0; padding:11px 12px; border:1px solid var(--line); border-radius:6px; }
    .ask-form button { padding:11px 16px; border:0; border-radius:6px; background:var(--brand); color:#fff; cursor:pointer; }
    .timeline { display:flex; flex-direction:column; gap:10px; }
    .timeline-item { background:#fff; border:1px solid var(--line); border-radius:8px; padding:12px; }
    .workflow { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:12px; margin:18px 0; }
    .workflow-step { background:#fff; border:1px solid var(--line); border-radius:8px; padding:14px; }
    .workflow-step strong { display:block; margin-bottom:6px; }
    .split { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:14px; }
    .callout { border-left:4px solid var(--brand); padding-left:12px; color:var(--muted); }
    .example-questions { display:flex; flex-wrap:wrap; gap:8px; margin:-4px 0 14px; }
    .example-questions button { padding:7px 10px; border:1px solid var(--line); border-radius:999px; background:#fff; color:var(--brand-dark); cursor:pointer; }
    @media (max-width: 820px) { .grid, .split { grid-template-columns: 1fr; } .topbar { align-items:flex-start; flex-direction:column; padding:14px 0; } nav a { margin:0 14px 0 0; } .toolbar { flex-direction:column; align-items:stretch; } }
    @media (max-width: 820px) { .chat-shell { grid-template-columns:1fr; } .ask-form { flex-direction:column; } }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <strong><a href="{% url 'aggregator:home' %}">中北信息聚合</a></strong>
      <nav>
        <a href="{% url 'aggregator:search' %}">搜索</a>
        <a href="{% url 'agent_runtime:research' %}">研究 Agent</a>
        <a href="{% url 'agent_runtime:ask' %}">旧版问答</a>
        <a href="{% url 'agent_runtime:agent_dashboard' %}">Agent 项目</a>
      </nav>
    </div>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
