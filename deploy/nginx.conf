log_format timed '$remote_addr - $remote_user [$time_local] "$request" '
                 '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                 'rt=$request_time urt=$upstream_response_time';

limit_req_zone $binary_remote_addr zone=site_per_ip:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=admin_per_ip:10m rate=10r/m;

upstream django_app {
  server web:8000;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 10m;
  limit_req_status 429;
  server_tokens off;
  access_log /var/log/nginx/access.log timed;

  if ($query_string ~* "(?:allow_url_include|auto_prepend_file|php://|think\\app|pearcmd)") {
    return 444;
  }

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_vary on;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml;

  location /static/ {
    alias /staticfiles/;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location ~* "(^|/)(?:\.env|\.git|boaform|containers/json|index\.php|phpunit|vendor/phpunit|wp-|xmlrpc\.php)" {
    return 444;
  }

  location /admin/ {
    limit_req zone=admin_per_ip burst=20 nodelay;
    proxy_pass http://django_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    limit_req zone=site_per_ip burst=40 nodelay;
    proxy_pass http://django_app;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
