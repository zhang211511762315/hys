name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
      - name: Run Django checks
        run: python manage.py check --settings=zhongbei_info.settings_test
      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run --settings=zhongbei_info.settings_test
      - name: Run zero-cost Agent evaluation
        run: python manage.py research_agent_eval --json --settings=zhongbei_info.settings_test
      - name: Validate Compose
        run: APP_ENV_FILE=.env.example docker compose config --quiet
